<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
        <defs>
            <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#000000"/>
                <stop offset="100%" stop-color="#111111"/>
            </linearGradient>
            <radialGradient id="glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#CE1126" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#CE1126" stop-opacity="0"/>
            </radialGradient>
        </defs>
        <rect width="1200" height="630" fill="url(#bg)"/>
        <rect width="1200" height="630" fill="url(#glow)"/>
        
        <!-- Grid overlay -->
        <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
            <line x1="0" y1="210" x2="1200" y2="210" />
            <line x1="0" y1="420" x2="1200" y2="420" />
            <line x1="400" y1="0" x2="400" y2="630" />
            <line x1="800" y1="0" x2="800" y2="630" />
        </g>
        
        <text x="600" y="250" font-family="Arial, sans-serif" font-weight="900" font-size="80" fill="#ffffff" text-anchor="middle">
            Meta Ads for Luxury Car Rental...
        </text>
        <text x="600" y="340" font-family="Arial, sans-serif" font-weight="400" font-size="30" fill="#CE1126" text-anchor="middle" letter-spacing="4">
            DIGITAL HYPE - THE LEAD GENERATION SYSTEM
        </text>
        <text x="600" y="550" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#666666" text-anchor="middle" letter-spacing="2">
            DIGITALHYPE.AE
        </text>
